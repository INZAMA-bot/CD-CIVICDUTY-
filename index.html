 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicDuty Terminal v4.1 - Speak. Serve. Be Heard.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulseDot { 0%, 100% { opacity: 0.3; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }
        .animate-pulseDot { animation: pulseDot 2s infinite ease-in-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slideUp { animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 2px; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans antialiased selection:bg-emerald-500 selection:text-black">

    <div class="max-w-md mx-auto min-h-screen bg-zinc-950 border-x border-zinc-900 flex flex-col justify-between shadow-2xl relative">
        
        <header id="global-header" class="p-4 border-b border-zinc-900 sticky top-0 bg-zinc-950/95 backdrop-blur z-20 flex flex-col gap-1 hidden">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-base font-black tracking-wider uppercase text-zinc-100 leading-none">CivicDuty</h1>
                    <span class="text-[9px] text-emerald-500 tracking-tight font-mono uppercase font-bold">Speak. Serve. Be Heard.</span>
                </div>
                <div class="flex items-center gap-1.5">
                    <span id="header-rank-badge" class="text-[8px] font-mono px-1.5 py-0.5 rounded font-bold tracking-wider"></span>
                    <span id="header-node-tag" class="text-[9px] font-mono px-1.5 py-0.5 bg-zinc-900 rounded text-zinc-400 border border-zinc-800 uppercase"></span>
                </div>
            </div>
        </header>

        <main id="view-viewport" class="flex-1 p-4 overflow-y-auto space-y-4">
            </main>

        <nav id="global-nav" class="border-t border-zinc-900 p-2 bg-zinc-950 flex justify-around items-center sticky bottom-0 z-20 hidden">
            </nav>
    </div>

    <script>
        // --- IMMUTABLE MULTI-TENANT DICTIONARY CORE ---
        const TENANT_MATRIX = {
            "UG": { name: "Uganda", struct: "Ministry / Authority", tag: "UG_NODE_01", defaultSla: 48 },
            "KE": { name: "Kenya", struct: "Ministry / State Dept", tag: "KE_NODE_02", defaultSla: 48 },
            "NG": { name: "Nigeria", struct: "Federal Department", tag: "NG_NODE_05", defaultSla: 48 }
        };

        const DEPARTMENT_WALLS = [
            { id: 'nwsc', country_id: 'UG', name: "National Water & Sewerage Corp", icon: "💧" },
            { id: 'unra', country_id: 'UG', name: "National Roads Authority (UNRA)", icon: "🛣️" },
            { id: 'kcca', country_id: 'UG', name: "Kampala Capital City Authority", icon: "🏛️" },
            { id: 'umeme', country_id: 'UG', name: "Umeme Power Grid", icon: "⚡" },
            { id: 'kplc', country_id: 'KE', name: "Kenya Power (KPLC)", icon: "⚡" },
            { id: 'nira', country_id: 'UG', name: "National Identification Authority", icon: "🪪" }
        ];

        // --- IN-MEMORY REPLICATED SUPABASE TABLES ---
        let db_profiles = {}; 
        let db_tickets = [
            {
                id: "tkt-101",
                country_id: "UG",
                dept_id: "nwsc",
                citizen_name: "Sovereign Watchdog",
                source: "App",
                title: "Main Street Water Pipe Burst",
                caption: "Water pressure has completely cracked the sidewalk asphalt here. Flooding local shops.",
                location_name: "Banda, Kampala",
                media_payloads: ["https://images.unsplash.com/photo-1542044896530-05d85be9b11a?w=400"],
                status: "Pending",
                created_at: new Date(Date.now() - 2 * 60 * 60 * 1000).toISOString(), 
                sla_expires_at: new Date(Date.now() + 46 * 60 * 60 * 1000).toISOString(),
                citizen_satisfaction: null,
                comments: []
            }
        ];

        // --- AUTHENTICATED STATE REFLECTORS ---
        let sessionUser = null; 
        let activeView = 'gateway'; 
        let selectedUploadMedia = null;
        let selectedTicketContextId = null;

        // --- BACKEND PROCESS AUTOMATION ENGINE ---
        function trigger_process_ticket_xp_allocation(ticket) {
            let user = db_profiles[ticket.citizen_id];
            if (!user) return;

            let xp_gain = 50; 
            if (ticket.media_payloads && ticket.media_payloads.length > 0) {
                xp_gain += 100; 
            }

            user.xp_score += xp_gain;

            if (user.xp_score >= 5000 && user.resolved_count >= 20) user.current_rank = 'Pioneer';
            else if (user.xp_score >= 1500) user.current_rank = 'Sentinel';
            else if (user.xp_score >= 500 && user.resolved_count >= 5) user.current_rank = 'Watchdog';
            else user.current_rank = 'Citizen';
        }

        function calculateSlaTimeRemaining(expiryStr) {
            const diff = new Date(expiryStr) - new Date();
            if (diff <= 0) return "00h 00m 00s (SLA Missed)";
            const hrs = Math.floor(diff / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            return `${hrs.toString().padStart(2, '0')}h ${mins.toString().padStart(2, '0')}m left`;
        }

        // ==========================================
        //         ROUTING AND VIEWPORT CONTROLLER
        // ==========================================
        function routeTo(targetView) {
            activeView = targetView;
            const h = document.getElementById('global-header');
            const n = document.getElementById('global-nav');

            if (['gateway', 'citizen_auth', 'gov_auth', 'properhaze_link'].includes(targetView)) {
                h.classList.add('hidden');
                n.classList.add('hidden');
            } else {
                h.classList.remove('hidden');
                n.classList.remove('hidden');
                
                document.getElementById('header-node-tag').innerText = sessionUser.nodeTag;
                const rBadge = document.getElementById('header-rank-badge');
                if (sessionUser.role === 'government') {
                    rBadge.innerText = "GOV_OFFICIAL";
                    rBadge.className = "text-[8px] font-mono px-1.5 py-0.5 rounded font-bold bg-amber-500/10 text-amber-400 border border-amber-500/20";
                } else {
                    const prof = db_profiles[sessionUser.id] || { current_rank: 'Citizen', xp_score: 0 };
                    rBadge.innerText = `${prof.current_rank.toUpperCase()} [${prof.xp_score} XP]`;
                    rBadge.className = "text-[8px] font-mono px-1.5 py-0.5 rounded font-bold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
                }
                renderDynamicNavbar();
            }
            renderView();
        }

        function renderDynamicNavbar() {
            const nav = document.getElementById('global-nav');
            if (sessionUser.role === 'government') {
                nav.innerHTML = `
                    <button onclick="routeTo('gov_dashboard')" class="flex flex-col items-center gap-0.5 text-amber-400">
                        <span class="text-lg">📥</span><span class="text-[9px] font-mono tracking-tight font-bold">Inbox Queue</span>
                    </button>
                    <button onclick="routeTo('gateway')" class="flex flex-col items-center gap-0.5 text-zinc-600 hover:text-red-400">
                        <span class="text-lg">🚪</span><span class="text-[9px] font-mono">Disconnect</span>
                    </button>
                `;
            } else {
                nav.innerHTML = `
                    <button onclick="routeTo('citizen_timeline')" class="flex flex-col items-center gap-0.5 ${activeView === 'citizen_timeline' ? 'text-emerald-400' : 'text-zinc-500'}">
                        <span class="text-lg">📋</span><span class="text-[9px] font-mono font-bold">Registry</span>
                    </button>
                    <button onclick="routeTo('citizen_report')" class="flex flex-col items-center gap-0.5 ${activeView === 'citizen_report' ? 'text-emerald-400' : 'text-zinc-500'}">
                        <span class="text-lg">➕</span><span class="text-[9px] font-mono font-bold">Speak</span>
                    </button>
                    <button onclick="routeTo('citizen_profile_view')" class="flex flex-col items-center gap-0.5 ${activeView === 'citizen_profile_view' ? 'text-emerald-400' : 'text-zinc-500'}">
                        <span class="text-lg">👤</span><span class="text-[9px] font-mono font-bold">Profile</span>
                    </button>
                `;
            }
        }

        function renderView() {
            const vp = document.getElementById('view-viewport');
            vp.classList.remove('animate-slideUp');
            void vp.offsetWidth; 
            vp.classList.add('animate-slideUp');

            switch (activeView) {
                case 'gateway': renderGatewayView(vp); break;
                case 'citizen_auth': renderCitizenAuthView(vp); break;
                case 'gov_auth': renderGovAuthView(vp); break;
                case 'properhaze_link': renderProperhazeLinkView(vp); break;
                case 'citizen_timeline': renderCitizenTimelineView(vp); break;
                case 'citizen_report': renderCitizenReportView(vp); break;
                case 'citizen_profile_view': renderCitizenProfileView(vp); break;
                case 'ticket_detail': renderTicketDetailView(vp); break;
                case 'gov_dashboard': renderGovDashboardView(vp); break;
            }
        }

        // ==========================================
        //          VIEW GENERATORS ENGINE RENDERERS
        // ==========================================

        function renderGatewayView(container) {
            container.innerHTML = `
                <div class="space-y-8 pt-12 pb-4 text-center">
                    <div class="space-y-1 relative inline-block mx-auto">
                        <h2 class="text-3xl font-black tracking-tighter text-zinc-100 uppercase select-none">CIVICDUTY</h2>
                        <div class="absolute -top-1.5 -right-3 w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981] animate-pulseDot"></div>
                    </div>
                    <div class="text-[10px] bg-zinc-900/60 border border-zinc-800 rounded-full px-3 py-1 w-fit mx-auto text-zinc-400 font-mono">
                        System Live • Multi-Node Active
                    </div>

                    <div class="space-y-4 pt-4 text-left">
                        <div onclick="routeTo('citizen_auth')" class="cursor-pointer bg-zinc-900/40 hover:bg-zinc-900 border border-zinc-800 p-5 rounded-2xl transition-all flex justify-between items-center group">
                            <div class="space-y-1">
                                <span class="text-sm font-bold text-zinc-200 block uppercase tracking-wide">Citizen Portal | Speak</span>
                                <span class="text-xs text-zinc-500 block">Verify Node Location. Report issues. Track SLAs.</span>
                            </div>
                            <span class="text-zinc-600 group-hover:text-emerald-400 transition-colors text-lg font-black">➔</span>
                        </div>

                        <div onclick="routeTo('gov_auth')" class="cursor-pointer bg-zinc-900/40 hover:bg-zinc-900 border border-zinc-800 p-5 rounded-2xl transition-all flex justify-between items-center group">
                            <div class="space-y-1">
                                <span class="text-sm font-bold text-amber-400 block uppercase tracking-wide">Government Desk | Serve</span>
                                <span class="text-xs text-zinc-500 block">Administrative credentials portal.</span>
                            </div>
                            <span class="text-zinc-600 group-hover:text-amber-400 transition-colors text-lg font-black">➔</span>
                        </div>
                    </div>

                    <div class="pt-2 border-t border-zinc-900">
                        <div onclick="routeTo('properhaze_link')" class="cursor-pointer bg-purple-950/10 hover:bg-purple-950/20 border border-purple-900/30 p-4 rounded-xl text-center transition-all">
                            <span class="text-xs font-bold text-purple-400">🔗 Properhaze Platform Link Settings</span>
                            <p class="text-[10px] text-zinc-500 mt-1">Configure profile visibility settings & discovery states.</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCitizenAuthView(container) {
            container.innerHTML = `
                <div class="space-y-5 pt-2">
                    <span onclick="routeTo('gateway')" class="text-xs text-zinc-500 cursor-pointer hover:text-zinc-300 font-mono">⇜ Gate Desk</span>
                    <div>
                        <h3 class="text-lg font-black tracking-tight text-zinc-100 uppercase">Sovereign Identity Setup</h3>
                        <p class="text-xs text-zinc-400 mt-0.5">Map access configurations to regional digital resolution networks.</p>
                    </div>

                    <div class="space-y-4 bg-zinc-900/40 p-5 rounded-2xl border border-zinc-900">
                        <label class="block space-y-1.5">
                            <span class="text-[10px] font-mono font-bold text-zinc-400 uppercase tracking-wider">Select Country Node</span>
                            <select id="auth-country" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-xs text-zinc-200 focus:outline-none font-mono">
                                ${Object.keys(TENANT_MATRIX).map(k => `<option value="${k}">${TENANT_MATRIX[k].name} (${TENANT_MATRIX[k].tag})</option>`).join('')}
                            </select>
                        </label>

                        <label class="block space-y-1.5">
                            <span class="text-[10px] font-mono font-bold text-zinc-400 uppercase tracking-wider">Identity Token Input</span>
                            <input id="auth-nin" type="text" placeholder="Enter alphanumeric code verification..." class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-xs text-zinc-200 focus:outline-none font-mono" />
                        </label>
                    </div>

                    <button onclick="actionExecuteCitizenLogin()" class="w-full bg-zinc-100 hover:bg-white text-zinc-950 font-black rounded-xl py-3.5 text-xs uppercase tracking-wider transition-all">
                        Initialize Node Access
                    </button>
                </div>
            `;
        }

        function actionExecuteCitizenLogin() {
            const country = document.getElementById('auth-country').value;
            const nin = document.getElementById('auth-nin').value.trim();
            if (!nin) return alert("Identification context parameter missing.");

            const generatedUuid = "usr-" + Math.floor(Math.random() * 90000 + 10000);
            if (!db_profiles[generatedUuid]) {
                db_profiles[generatedUuid] = {
                    id: generatedUuid,
                    country_id: country,
                    full_name: "Watchdog " + nin.slice(0, 4).toUpperCase(),
                    xp_score: 0,
                    current_rank: "Citizen",
                    resolved_count: 0
                };
            }

            sessionUser = {
                id: generatedUuid,
                role: 'citizen',
                country_id: country,
                nodeTag: TENANT_MATRIX[country].tag
            };
            routeTo('citizen_timeline');
        }

        function renderGovAuthView(container) {
            container.innerHTML = `
                <div class="space-y-5 pt-2">
                    <span onclick="routeTo('gateway')" class="text-xs text-zinc-500 cursor-pointer hover:text-zinc-300 font-mono">⇜ Return</span>
                    <div>
                        <h3 class="text-lg font-black tracking-tight text-amber-400 uppercase">Department Terminal Access</h3>
                    </div>

                    <div class="space-y-4 bg-zinc-900/40 p-5 rounded-2xl border border-zinc-900">
                        <label class="block space-y-1.5">
                            <span class="text-[10px] font-mono font-bold text-zinc-400 uppercase tracking-wider">Select Department Seat</span>
                            <select id="gov-auth-dept" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-xs text-zinc-200 focus:outline-none font-mono">
                                ${DEPARTMENT_WALLS.map(d => `<option value="${d.id}|${d.country_id}">[${d.country_id}] ${d.name}</option>`).join('')}
                            </select>
                        </label>
                    </div>

                    <button onclick="actionExecuteGovLogin()" class="w-full bg-amber-500 hover:bg-amber-400 text-zinc-950 font-black rounded-xl py-3.5 text-xs uppercase tracking-wider transition-all">
                        Mount Verified Session
                    </button>
                </div>
            `;
        }

        function actionExecuteGovLogin() {
            const composite = document.getElementById('gov-auth-dept').value.split('|');
            sessionUser = {
                id: "gov-session-node",
                role: 'government',
                country_id: composite[1],
                dept_id: composite[0],
                nodeTag: TENANT_MATRIX[composite[1]].tag
            };
            routeTo('gov_dashboard');
        }

        function renderProperhazeLinkView(container) {
            container.innerHTML = `
                <div class="space-y-5 pt-2">
                    <span onclick="routeTo('gateway')" class="text-xs text-zinc-500 cursor-pointer hover:text-zinc-300 font-mono">⇜ Return</span>
                    <div>
                        <h3 class="text-lg font-black tracking-tight text-purple-400 uppercase">Properhaze Core Integrations</h3>
                    </div>

                    <div class="bg-purple-950/10 border border-purple-900/30 p-4 rounded-xl space-y-2 text-xs leading-relaxed text-zinc-300">
                        <p><strong>Visibility Guardrail Settings:</strong> Only individuals signed up to Properhaze and who have accepted public facial recognition in the privacy section can be visible when scanned. Those who haven't accepted will not be matched when scanned and can only be found through a name search via the search bar.</p>
                    </div>

                    <div class="bg-zinc-900/50 border border-zinc-900 p-4 rounded-xl flex items-center justify-between">
                        <div>
                            <span class="text-xs font-bold text-zinc-200 block">Accept Public Biometric Discovery</span>
                            <span class="text-[10px] text-zinc-500 block">Allow automated match sequences across registries.</span>
                        </div>
                        <input type="checkbox" id="ph-biometric-toggle" class="w-4 h-4 rounded bg-zinc-900 border-zinc-800 text-purple-500 focus:ring-0" />
                    </div>

                    <button onclick="alert('Properhaze synchronization configurations saved successfully.'); routeTo('gateway');" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-black rounded-xl py-3 text-xs uppercase tracking-wider transition-all">
                        Save Configuration Matrix
                    </button>
                </div>
            `;
        }

        function renderCitizenTimelineView(container) {
            const isolatedTickets = db_tickets.filter(t => t.country_id === sessionUser.country_id);
            let html = `
                <div class="bg-zinc-900/40 border border-zinc-900 p-3 rounded-xl flex items-center justify-between text-[10px] font-mono text-zinc-400">
                    <span>📡 Stream Trackers Online: <strong class="text-emerald-400">${sessionUser.nodeTag}</strong></span>
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulseDot"></span>
                </div>
                <div class="space-y-4 pt-1">
            `;

            if (isolatedTickets.length === 0) {
                html += `<div class="text-center py-12 text-xs text-zinc-600 italic">No public logs uploaded inside this stream directory code path.</div>`;
            } else {
                isolatedTickets.forEach(t => {
                    const matchedDept = DEPARTMENT_WALLS.find(d => d.id === t.dept_id) || { name: t.dept_id, icon: "🏛️" };
                    let statusColor = t.status === 'Resolved' ? "text-emerald-400 bg-emerald-400/10 border-emerald-500/20" : "text-amber-400 bg-amber-400/10 border-amber-500/20";

                    html += `
                        <div onclick="selectedTicketContextId='${t.id}'; routeTo('ticket_detail');" class="bg-zinc-900/20 border-b border-zinc-900 pb-4 pt-1 space-y-2.5 cursor-pointer hover:bg-zinc-900/10 transition-all">
                            <div class="flex items-start gap-3">
                                <div class="w-9 h-9 rounded-full bg-zinc-900 border border-zinc-800 flex items-center justify-center text-sm shrink-0">
                                    ${matchedDept.icon}
                                </div>
                                <div class="flex-1 space-y-1">
                                    <div class="flex justify-between items-center gap-2">
                                        <div>
                                            <span class="font-black text-xs text-zinc-200 tracking-tight block">${matchedDept.name}</span>
