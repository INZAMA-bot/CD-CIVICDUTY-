 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicDuty Terminal v4.5 - Unified Node</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulseDot { 0%, 100% { opacity: 0.3; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.1); } }
        .animate-pulseDot { animation: pulseDot 2s infinite ease-in-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slideUp { animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 2px; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans antialiased selection:bg-emerald-500 selection:text-black">

    <div class="max-w-md mx-auto min-h-screen bg-zinc-950 border-x border-zinc-900 flex flex-col justify-between shadow-2xl relative">
        <header id="global-header" class="p-4 border-b border-zinc-900 sticky top-0 bg-zinc-950/95 backdrop-blur z-20 flex flex-col gap-1 hidden">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-base font-black tracking-wider uppercase text-zinc-100 leading-none">CivicDuty</h1>
                    <span class="text-[9px] text-emerald-500 tracking-tight font-mono uppercase font-bold">Speak. Serve. Be Heard.</span>
                </div>
                <div class="flex items-center gap-1.5">
                    <span id="header-rank-badge" class="text-[8px] font-mono px-1.5 py-0.5 rounded font-bold tracking-wider"></span>
                    <span id="header-node-tag" class="text-[9px] font-mono px-1.5 py-0.5 bg-zinc-900 rounded text-zinc-400 border border-zinc-800 uppercase"></span>
                </div>
            </div>
        </header>

        <main id="view-viewport" class="flex-1 p-4 overflow-y-auto space-y-4"></main>
        <nav id="global-nav" class="border-t border-zinc-900 p-2 bg-zinc-950 flex justify-around items-center sticky bottom-0 z-20 hidden"></nav>
    </div>

    <script>
        const TENANT_MATRIX = {
            "UG": { name: "Uganda", struct: "Ministry / Authority", tag: "UG_NODE_01" },
            "KE": { name: "Kenya", struct: "Ministry / State Dept", tag: "KE_NODE_02" },
            "NG": { name: "Nigeria", struct: "Federal Department", tag: "NG_NODE_05" }
        };

        const DEPARTMENT_WALLS = [
            { id: 'nwsc', country_id: 'UG', name: "National Water & Sewerage Corp", icon: "💧" },
            { id: 'unra', country_id: 'UG', name: "National Roads Authority (UNRA)", icon: "🛣️" },
            { id: 'kcca', country_id: 'UG', name: "Kampala Capital City Authority", icon: "🏛️" },
            { id: 'umeme', country_id: 'UG', name: "Umeme Power Grid", icon: "⚡" },
            { id: 'kplc', country_id: 'KE', name: "Kenya Power (KPLC)", icon: "⚡" }
        ];

        let db_profiles = {}; 
        let db_tickets = [
            {
                id: "tkt-101",
                country_id: "UG",
                dept_id: "nwsc",
                citizen_name: "Sovereign Watchdog",
                title: "Main Street Water Main Burst",
                caption: "Water pressure has completely destroyed the sidewalk asphalt here. Flooding houses.",
                location_name: "Sector 4",
                status: "Pending",
                created_at: new Date(Date.now() - 2 * 60 * 60 * 1000).toISOString(), 
                comments: []
            }
        ];

        let sessionUser = null; 
        let activeView = 'gateway'; 
        let selectedTicketContextId = null;

        function routeTo(targetView) {
            activeView = targetView;
            const h = document.getElementById('global-header');
            const n = document.getElementById('global-nav');

            if (['gateway', 'citizen_auth', 'gov_auth', 'properhaze_link'].includes(targetView)) {
                h.classList.add('hidden');
                n.classList.add('hidden');
            } else {
                h.classList.remove('hidden');
                n.classList.remove('hidden');
                document.getElementById('header-node-tag').innerText = sessionUser.nodeTag;
                const rBadge = document.getElementById('header-rank-badge');
                if (sessionUser.role === 'government') {
                    rBadge.innerText = "GOV_OFFICIAL";
                    rBadge.className = "text-[8px] font-mono px-1.5 py-0.5 rounded font-bold bg-amber-500/10 text-amber-400 border border-amber-500/20";
                } else {
                    const prof = db_profiles[sessionUser.id] || { current_rank: 'Citizen', xp_score: 0 };
                    rBadge.innerText = `${prof.current_rank.toUpperCase()} [${prof.xp_score} XP]`;
                    rBadge.className = "text-[8px] font-mono px-1.5 py-0.5 rounded font-bold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
                }
                renderDynamicNavbar();
            }
            renderView();
        }

        function renderDynamicNavbar() {
            const nav = document.getElementById('global-nav');
            if (sessionUser.role === 'government') {
                nav.innerHTML = `
                    <button onclick="routeTo('gov_dashboard')" class="flex flex-col items-center gap-0.5 text-amber-400">
                        <span class="text-base">📥</span><span class="text-[9px] font-mono tracking-tight font-bold">Resolution Hub</span>
                    </button>
                    <button onclick="sessionUser=null; routeTo('gateway')" class="flex flex-col items-center gap-0.5 text-zinc-600 hover:text-red-400">
                        <span class="text-base">🚪</span><span class="text-[9px] font-mono">Exit Node</span>
                    </button>
                `;
            } else {
                nav.innerHTML = `
                    <button onclick="routeTo('citizen_timeline')" class="flex flex-col items-center gap-0.5 ${activeView === 'citizen_timeline' ? 'text-emerald-400' : 'text-zinc-500'}">
                        <span class="text-base">🛡️</span><span class="text-[9px] font-mono font-bold">Registry</span>
                    </button>
                    <button onclick="routeTo('citizen_report')" class="flex flex-col items-center gap-0.5 ${activeView === 'citizen_report' ? 'text-emerald-400' : 'text-zinc-500'}">
                        <span class="text-base">➕</span><span class="text-[9px] font-mono font-bold">File Ticket</span>
                    </button>
                    <button onclick="routeTo('citizen_profile_view')" class="flex flex-col items-center gap-0.5 ${activeView === 'citizen_profile_view' ? 'text-emerald-400' : 'text-zinc-500'}">
                        <span class="text-base">👤</span><span class="text-[9px] font-mono font-bold">Identity</span>
                    </button>
                `;
            }
        }

        function renderView() {
            const vp = document.getElementById('view-viewport');
            vp.classList.remove('animate-slideUp');
            void vp.offsetWidth; 
            vp.classList.add('animate-slideUp');

            switch (activeView) {
                case 'gateway': renderGatewayView(vp); break;
                case 'citizen_auth': renderCitizenAuthView(vp); break;
                case 'gov_auth': renderGovAuthView(vp); break;
                case 'properhaze_link': renderProperhazeLinkView(vp); break;
                case 'citizen_timeline': renderCitizenTimelineView(vp); break;
                case 'citizen_report': renderCitizenReportView(vp); break;
                case 'citizen_profile_view': renderCitizenProfileView(vp); break;
                case 'ticket_detail': renderTicketDetailView(vp); break;
                case 'gov_dashboard': renderGovDashboardView(vp); break;
            }
        }

        function renderGatewayView(container) {
            container.innerHTML = `
                <div class="space-y-8 pt-16 pb-4 text-center">
                    <div class="space-y-1 relative inline-block mx-auto">
                        <h2 class="text-3xl font-black tracking-tighter text-zinc-100 uppercase select-none">CIVICDUTY</h2>
                        <div class="absolute -top-1.5 -right-3 w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981] animate-pulseDot"></div>
                    </div>
                    <p class="text-xs text-zinc-500 max-w-xs mx-auto -mt-4">Decentralized infrastructure reporting and cross-border government accountability routing.</p>
                    <div class="space-y-3 pt-6 text-left">
                        <div onclick="routeTo('citizen_auth')" class="cursor-pointer bg-zinc-900/40 hover:bg-zinc-900 border border-zinc-800 p-5 rounded-2xl transition-all flex justify-between items-center group">
                            <div class="space-y-1">
                                <span class="text-sm font-bold text-zinc-200 block uppercase tracking-wide">Citizen Terminal Entry</span>
                                <span class="text-xs text-zinc-500 block">Verify identity node. Report issues. Track updates.</span>
                            </div>
                            <span class="text-zinc-600 group-hover:text-emerald-400 transition-colors font-black">➔</span>
                        </div>
                        <div onclick="routeTo('gov_auth')" class="cursor-pointer bg-zinc-900/40 hover:bg-zinc-900 border border-zinc-800 p-5 rounded-2xl transition-all flex justify-between items-center group">
                            <div class="space-y-1">
                                <span class="text-sm font-bold text-amber-400 block uppercase tracking-wide">Government Operations Desk</span>
                                <span class="text-xs text-zinc-500 block">Administrative authorization gateway for department seats.</span>
                            </div>
                            <span class="text-zinc-600 group-hover:text-amber-400 transition-colors font-black">➔</span>
                        </div>
                    </div>
                    <div class="pt-6 border-t border-zinc-900/60">
                        <div onclick="routeTo('properhaze_link')" class="cursor-pointer bg-purple-950/10 hover:bg-purple-950/20 border border-purple-900/30 p-4 rounded-xl text-center transition-all">
                            <span class="text-xs font-bold text-purple-400">🔗 Properhaze Identity & Visibility Controls</span>
                            <p class="text-[10px] text-zinc-500 mt-1">Configure systemic biometric discovery and search parameters.</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCitizenAuthView(container) {
            container.innerHTML = `
                <div class="space-y-5 pt-2">
                    <span onclick="routeTo('gateway')" class="text-xs text-zinc-500 cursor-pointer hover:text-zinc-300 font-mono">⇜ Gate Desk</span>
                    <div>
                        <h3 class="text-lg font-black tracking-tight text-zinc-100 uppercase">Establish Sovereign Identity</h3>
                        <p class="text-xs text-zinc-400 mt-0.5">Verify identity credentials to map your access point.</p>
                    </div>
                    <div class="space-y-4 bg-zinc-900/40 p-5 rounded-2xl border border-zinc-900">
                        <label class="block space-y-1.5">
                            <span class="text-[10px] font-mono font-bold text-zinc-400 uppercase tracking-wider">Select Country Node</span>
                            <select id="auth-country" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-xs text-zinc-200 focus:outline-none font-mono">
                                ${Object.keys(TENANT_MATRIX).map(k => `<option value="${k}">${TENANT_MATRIX[k].name} (${TENANT_MATRIX[k].tag})</option>`).join('')}
                            </select>
                        </label>
                        <label class="block space-y-1.5">
                            <span class="text-[10px] font-mono font-bold text-zinc-400 uppercase tracking-wider">National Identity Code (NIN/ID)</span>
                            <input id="auth-nin" type="text" placeholder="Enter identification code sequence..." class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-xs text-zinc-200 focus:outline-none font-mono" />
                        </label>
                    </div>
                    <button onclick="actionExecuteCitizenLogin()" class="w-full bg-zinc-100 hover:bg-white text-zinc-950 font-black rounded-xl py-3.5 text-xs uppercase tracking-wider transition-all">
                        Initialize Node Access
                    </button>
                </div>
            `;
        }

        function actionExecuteCitizenLogin() {
            const country = document.getElementById('auth-country').value;
            const nin = document.getElementById('auth-nin').value.trim();
            if (!nin) return alert("Identification credentials mandatory.");
            const generatedUuid = "usr-" + Math.floor(Math.random() * 90000 + 10000);
            if (!db_profiles[generatedUuid]) {
                db_profiles[generatedUuid] = {
                    id: generatedUuid,
                    country_id: country,
                    full_name: "Watchdog " + nin.slice(0, 4).toUpperCase(),
                    xp_score: 120,
                    current_rank: "Sentinel",
                    resolved_count: 3
                };
            }
            sessionUser = { id: generatedUuid, role: 'citizen', country_id: country, nodeTag: TENANT_MATRIX[country].tag };
            routeTo('citizen_timeline');
        }

        function renderGovAuthView(container) {
            container.innerHTML = `
                <div class="space-y-5 pt-2">
                    <span onclick="routeTo('gateway')" class="text-xs text-zinc-500 cursor-pointer hover:text-zinc-300 font-mono">⇜ Return</span>
                    <div><h3 class="text-lg font-black tracking-tight text-amber-400 uppercase">Department Authorization Seat</h3></div>
                    <div class="space-y-4 bg-zinc-900/40 p-5 rounded-2xl border border-zinc-900">
                        <label class="block space-y-1.5">
                            <span class="text-[10px] font-mono font-bold text-zinc-400 uppercase tracking-wider">Select Department Seat</span>
                            <select id="gov-auth-dept" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-xs text-zinc-200 focus:outline-none font-mono">
                                ${DEPARTMENT_WALLS.map(d => `<option value="${d.id}|${d.country_id}">[${d.country_id}] ${d.name}</option>`).join('')}
                            </select>
                        </label>
                    </div>
                    <button onclick="actionExecuteGovLogin()" class="w-full bg-amber-500 hover:bg-amber-400 text-zinc-950 font-black rounded-xl py-3.5 text-xs uppercase tracking-wider transition-all">
                        Mount Verified Desk Session
                    </button>
                </div>
            `;
        }

        function actionExecuteGovLogin() {
            const composite = document.getElementById('gov-auth-dept').value.split('|');
            sessionUser = { id: "gov-session-node", role: 'government', country_id: composite[1], dept_id: composite[0], nodeTag: TENANT_MATRIX[composite[1]].tag };
            routeTo('gov_dashboard');
        }

        function renderProperhazeLinkView(container) {
            container.innerHTML = `
                <div class="space-y-5 pt-2">
                    <span onclick="routeTo('gateway')" class="text-xs text-zinc-500 cursor-pointer hover:text-zinc-300 font-mono">⇜ Return</span>
                    <div><h3 class="text-lg font-black tracking-tight text-purple-400 uppercase">Properhaze Integration Matrix</h3></div>
                    <div class="bg-purple-950/10 border border-purple-900/30 p-4 rounded-xl space-y-2 text-xs text-zinc-300 leading-relaxed">
                        <p><strong>Visibility Guardrail Rule:</strong> Only individuals signed up to Properhaze and who have accepted public facial recognition in the privacy section can be visible when scanned. Those who haven't accepted will not be matched when scanned and can only be found through a name search via the search bar.</p>
                    </div>
                    <div class="bg-zinc-900/50 border border-zinc-900 p-4 rounded-xl flex items-center justify-between">
                        <div>
                            <span class="text-xs font-bold text-zinc-200 block">Public Biometric Discovery Token</span>
                            <span class="text-[10px] text-zinc-500 block">Allow automated matching metrics across verification loops.</span>
                        </div>
                        <input type="checkbox" checked class="w-4 h-4 rounded bg-zinc-900 border-zinc-800 text-purple-500 focus:ring-0" />
                    </div>
                    <button onclick="alert('Properhaze integration constraints sync\'d.'); routeTo('gateway');" class="w-full bg-purple-600 hover:bg-purple-500 text-white font-black rounded-xl py-3 text-xs uppercase tracking-wider transition-all">
                        Commit Configurations
                    </button>
                </div>
            `;
        }

        function renderCitizenTimelineView(container) {
            const localTickets = db_tickets.filter(t => t.country_id === sessionUser.country_id);
            let html = `<div class="text-xs font-bold tracking-tight text-zinc-400 uppercase px-0.5">Active Resolution Logs</div><div class="space-y-3">`;
            if (localTickets.length === 0) {
                html += `<div class="text-center py-12 text-xs text-zinc-600 italic">No public logs inside this regional matrix code path.</div>`;
            } else {
                localTickets.forEach(t => {
                    const dept = DEPARTMENT_WALLS.find(d => d.id === t.dept_id) || { name: t.dept_id, icon: "🏛️" };
                    let badgeClass = t.status === 'Resolved' ? "text-emerald-400 bg-emerald-400/10 border-emerald-500/20" : "text-amber-400 bg-amber-400/10 border-amber-500/20";
                    html += `
                        <div onclick="selectedTicketContextId='${t.id}'; routeTo('ticket_detail');" class="bg-zinc-900/30 border border-zinc-900 p-4 rounded-xl space-y-3 cursor-pointer hover:bg-zinc-900/50 transition-all">
                            <div class="flex justify-between items-start gap-2">
                                <div>
                                    <h4 class="font-black text-sm text-zinc-200 tracking-tight">${t.title}</h4>
                                    <span class="text-[10px] text-zinc-500 font-mono block mt-0.5">${dept.icon} ${dept.name}</span>
                                </div>
                                <span class="text-[8px] font-mono px-1.5 py-0.5 rounded border uppercase shrink-0 ${badgeClass}">${t.status}</span>
                            </div>
                            <p class="text-xs text-zinc-400 line-clamp-2 leading-relaxed">${t.caption}</p>
                            <div class="flex items-center justify-between text-[9px] font-mono text-zinc-500 pt-1 border-t border-zinc-900/50">
                                <span>📍 ${t.location_name}</span><span>⏱️ 2h ago</span>
                            </div>
                        </div>
                    `;
                });
            }
            html += `</div>`; container.innerHTML = html;
        }

        function renderCitizenReportView(container) {
            const localDepts = DEPARTMENT_WALLS.filter(d => d.country_id === sessionUser.country_id);
            container.innerHTML = `
                <div class="space-y-4">
                    <div>
                        <h3 class="text-base font-black tracking-tight text-zinc-100 uppercase">Log New Resolution Ticket</h3>
                        <p class="text-xs text-zinc-500">Submit geotagged infrastructure proof straight to department metrics mapping.</p>
                    </div>
                    <div class="space-y-3 bg-zinc-900/40 p-4 rounded-xl border border-zinc-900 text-xs">
                        <label class="block space-y-1">
                            <span class="font-mono text-zinc-400 text-[10px] uppercase">Issue Headline Summary</span>
                            <input id="f-title" type="text" placeholder="e.g., Damaged bridge railing" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-2.5 text-zinc-200 focus:outline-none" />
                        </label>
                        <label class="block space-y-1">
                            <span class="font-mono text-zinc-400 text-[10px] uppercase">Target Department Branch</span>
                            <select id="f-dept" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-2.5 text-zinc-200 font-mono focus:outline-none">
                                ${localDepts.map(d => `<option value="${d.id}">${d.icon} ${d.name}</option>`).join('')}
                            </select>
                        </label>
                        <label class="block space-y-1">
                            <span class="font-mono text-zinc-400 text-[10px] uppercase">Description / Context Caption</span>
                            <textarea id="f-caption" rows="3" placeholder="Provide situation matrix parameters..." class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-2.5 text-zinc-200 resize-none focus:outline-none"></textarea>
                        </label>
                        <label class="block space-y-1">
                            <span class="font-mono text-zinc-400 text-[10px] uppercase">Localized Sector / Area Ref</span>
                            <input id="f-loc" type="text" placeholder="e.g. Sector 4, Main Highway" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-2.5 text-zinc-200 focus:outline-none" />
                        </label>
                    </div>
                    <button onclick="actionSubmitTicketForm()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-zinc-950 font-black rounded-xl py-3 text-xs uppercase tracking-wider transition-all">Dispatch Verified Ticket</button>
                </div>
            `;
        }

        function actionSubmitTicketForm() {
            const title = document.getElementById('f-title').value.trim();
            const dept = document.getElementById('f-dept').value;
            const caption = document.getElementById('f-caption').value.trim();
            const loc = document.getElementById('f-loc').value.trim();
            if (!title || !caption || !loc) return alert("All target matrix parameters require validation input values.");
            const prof = db_profiles[sessionUser.id];
            const newTicket = {
                id: "tkt-" + Math.floor(Math.random() * 90000 + 10000),
                country_id: sessionUser.country_id,
                dept_id: dept,
                citizen_id: sessionUser.id,
                citizen_name: prof ? prof.full_name : "Citizen Sentinel",
                title: title,
                caption: caption,
                location_name: loc,
                status: "Pending",
                created_at: new Date().toISOString(),
                comments: []
            };
            db_tickets.unshift(newTicket);
            alert("Sovereign ticket queued into dispatch pipelines.");
            routeTo('citizen_timeline');
        }

        function renderTicketDetailView(container) {
            const ticket = db_tickets.find(t => t.id === selectedTicketContextId);
            if (!ticket) return routeTo('citizen_timeline');
            const dept = DEPARTMENT_WALLS.find(d => d.id === ticket.dept_id) || { name: ticket.dept_id };
            let badgeClass = ticket.status === 'Resolved' ? "text-emerald-400 bg-emerald-400/10 border-emerald-500/20" : "text-amber-400 bg-amber-400/10 border-amber-500/20";
            let html = `
                <div class="space-y-4">
                    <span onclick="routeTo('${sessionUser.role === 'government' ? 'gov_dashboard' : 'citizen_timeline'}')" class="text-xs text-zinc-500 cursor-pointer hover:text-zinc-300 font-mono">⇜ Return to Queue</span>
                    <div class="bg-zinc-900/40 border border-zinc-900 p-5 rounded-2xl space-y-3">
                        <div class="flex justify-between items-start gap-4">
                            <div>
                                <h3 class="font-black text-base text-zinc-100 tracking-tight leading-snug">${ticket.title}</h3>
                                <span class="text-[10px] font-mono text-zinc-500 block mt-1">Responsible Seat: ${dept.name}</span>
                            </div>
                            <span class="text-[8px] font-mono px-2 py-0.5 rounded border uppercase shrink-0 ${badgeClass}">${ticket.status}</span>
                        </div>
                        <p class="text-xs text-zinc-300 leading-relaxed pt-1">${ticket.caption}</p>
                        <div class="text-[10px] font-mono text-zinc-500 pt-2 border-t border-zinc-900 flex justify-between">
                            <span>Filer: ${ticket.citizen_name}</span><span>📍 ${ticket.location_name}</span>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <span class="text-[10px] font-mono tracking-wider text-zinc-500 uppercase block px-0.5">Official Response Desk Signature</span>
            `;
            if (ticket.comments.length === 0) {
                html += `<div class="border border-zinc-900 bg-zinc-900/10 p-4 rounded-xl text-center"><p class="text-xs text-zinc-600 italic">No departmental confirmation signature printed to this node block yet.</p></div>`;
            } else {
                ticket.comments.forEach(c => {
                    html += `<div class="border border-amber-500/10 bg-amber-500/[0.02] p-4 rounded-xl space-y-1.5 text-xs"><span class="font-mono text-amber-400 text-[9px] font-bold block uppercase tracking-wider">🔒 UNIFIED AUTHORITY SIGN-OFF</span><p class="text-zinc-300 leading-relaxed">${c.msg}</p></div>`;
                });
            }
            html += `</div></div>`; container.innerHTML = html;
        }

        function renderCitizenProfileView(container) {
            const prof = db_profiles[sessionUser.id] || { full_name: "Citizen Participant", xp_score: 120, current_rank: "Sentinel", resolved_count: 3 };
            container.innerHTML = `
                <div class="bg-zinc-900/40 border border-zinc-900 rounded-2xl p-6 text-center space-y-4">
                    <div class="w-12 h-12 rounded-full bg-zinc-900 border border-zinc-800 flex items-center justify-center text-xl mx-auto">🪪</div>
                    <div>
                        <h3 class="text-base font-black text-zinc-100 uppercase tracking-tight">${prof.full_name}</h3>
                        <span class="text-[9px] font-mono text-emerald-400 bg-emerald-500/5 px-2.5 py-0.5 rounded border border-emerald-500/20 block w-fit mx-auto mt-1">${prof.current_rank.toUpperCase()}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-left font-mono">
                        <div class="bg-zinc-950 border border-zinc-900 p-3 rounded-xl"><span class="text-[8px] text-zinc-500 block uppercase">Trust Metric</span><span class="text-xs font-black text-zinc-200">${prof.xp_score} XP</span></div>
                        <div class="bg-zinc-950 border border-zinc-900 p-3 rounded-xl"><span class="text-[8px] text-zinc-500 block uppercase">Verified Clearances</span><span class="text-xs font-black text-zinc-200">${prof.resolved_count} Logs</span></div>
                    </div>
                    <button onclick="sessionUser=null; routeTo('gateway');" class="w-full bg-zinc-950 border border-zinc-800 hover:border-red-900/40 text-zinc-500 hover:text-red-400 py-2.5 rounded-xl text-xs font-mono transition-colors">DISCONNECT LAYER NODE</button>
                </div>
            `;
        }

        function renderGovDashboardView(container) {
            const currentDeptDetails = DEPARTMENT_WALLS.find(d => d.id === sessionUser.dept_id) || { name: sessionUser.dept_id };
            const deptQueue = db_tickets.filter(t => t.country_id === sessionUser.country_id && t.dept_id === sessionUser.dept_id);
            let html = `<div class="space-y-1"><h3 class="text-base font-black text-zinc-100 uppercase tracking-tight">${currentDeptDetails.name}</h3><p class="text-xs text-zinc-500">Processing live environmental infrastructure feedback loop channels.</p></div><div class="space-y-3 pt-2">`;
            if (deptQueue.length === 0) {
                html += `<div class="text-center py-12 text-xs text-zinc-600 italic">Queue isolated clear. No pending items reported inside node stream.</div>`;
            } else {
                deptQueue.forEach(t => {
                    html += `
                        <div class="bg-zinc-900/40 border border-zinc-900 p-4 rounded-xl space-y-3">
                            <div class="flex justify-between items-start gap-2">
                                <div>
                                    <h4 class="font-black text-xs text-zinc-200 leading-snug">${t.title}</h4>
                                    <span class="text-[9px] font-mono text-zinc-500 block mt-0.5">Location Anchor: ${t.location_name}</span>
                                </div>
                                <span class="text-[8px] font-mono px-1.5 py-0.5 rounded border bg-amber-500/10 text-amber-400 border-amber-500/20 uppercase shrink-0">${t.status}</span>
                            </div>
                            <div class="flex gap-2 pt-1">
                                <button onclick="selectedTicketContextId='${t.id}'; routeTo('ticket_detail');" class="flex-1 bg-zinc-900 hover:bg-zinc-800 text-zinc-400 hover:text-zinc-200 py-2 rounded-lg text-xs font-mono transition-colors">Inspect Logs</button>
                                ${t.status !== 'Resolved' ? `<button onclick="actionExecuteStateResolution('${t.id}')" class="flex-1 bg-amber-500 hover:bg-amber-400 text-zinc-950 py-2 rounded-lg text-xs font-bold uppercase tracking-tight transition-colors">Sign Resolution</button>` : ''}
                            </div>
                        </div>
                    `;
                });
            }
            html += `</div>`; container.innerHTML = html;
        }

        function actionExecuteStateResolution(id) {
            const ticket = db_tickets.find(t => t.id === id);
            if (ticket) {
                ticket.status = 'Resolved';
                ticket.comments.push({ sender: "Unified Authority Central Node", role: "government", msg: "Verified resolution state achieved. Field operations deployed target fixes successfully." });
                alert("Resolution signed off successfully.");
                renderView();
            }
        }

        routeTo('gateway');
    </script>
</body>
</html>
